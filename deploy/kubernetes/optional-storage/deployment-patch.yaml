apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-k8s-lab
  namespace: flask-k8s-lab
spec:
  template:
    spec:
      containers:
        - name: application
          volumeMounts:
            - name: application-data
              mountPath: /app/data
      volumes:
        - name: application-data
          persistentVolumeClaim:
            claimName: flask-k8s-lab-data
