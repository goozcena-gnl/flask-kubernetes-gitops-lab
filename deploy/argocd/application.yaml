apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flask-k8s-lab
  namespace: argocd
spec:
  project: default
  source:
    repoURL: <GIT_REPOSITORY_URL>
    targetRevision: main
    path: deploy/kubernetes/base
  destination:
    server: https://kubernetes.default.svc
    namespace: flask-k8s-lab
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
