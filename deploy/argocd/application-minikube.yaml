apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flask-k8s-lab-minikube
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/goozcena-gnl/flask-kubernetes-gitops-lab.git
    targetRevision: main
    path: deploy/kubernetes/overlays/minikube

  destination:
    server: https://kubernetes.default.svc
    namespace: flask-k8s-lab

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false

    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
